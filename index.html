<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="A simple stretching routine timer to guide your daily stretches.">
  <meta name="theme-color" content="#4ECDC4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Stretch Timer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== ROUTINE LIST SCREEN ==================== -->
  <div id="screen-list" class="screen active">
    <header class="app-header">
      <h1 class="app-title">Stretch Timer</h1>
      <p class="app-subtitle">Pick a routine and start stretching</p>
      <button id="btn-test-sound" class="btn btn-small btn-outline btn-test-sound" aria-label="Test sound">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        Test Sound
      </button>
    </header>

    <div id="routine-list" class="routine-list">
      <!-- Routine cards rendered by JS -->
    </div>

    <button id="btn-new-routine" class="btn btn-primary btn-fab" aria-label="Create new routine">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- ==================== ROUTINE EDITOR SCREEN ==================== -->
  <div id="screen-editor" class="screen">
    <header class="editor-header">
      <button id="btn-editor-back" class="btn btn-icon" aria-label="Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 class="editor-title" id="editor-title">New Routine</h2>
      <button id="btn-save-routine" class="btn btn-text">Save</button>
    </header>

    <div class="editor-body">
      <div class="form-group">
        <label for="routine-name">Routine Name</label>
        <input type="text" id="routine-name" class="input" placeholder="e.g. Morning Stretch" maxlength="50">
      </div>

      <div class="exercise-list-header">
        <h3>Exercises</h3>
        <button id="btn-add-exercise" class="btn btn-small btn-outline">+ Add</button>
      </div>

      <div id="exercise-list-editor" class="exercise-list-editor">
        <!-- Exercise rows rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ==================== PLAYER SCREEN ==================== -->
  <div id="screen-player" class="screen">
    <header class="player-header">
      <button id="btn-player-back" class="btn btn-icon" aria-label="Stop and go back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="player-routine-name" class="player-routine-name"></span>
      <span id="player-progress" class="player-progress"></span>
    </header>

    <div class="player-body">
      <!-- Timer ring -->
      <div class="timer-container">
        <svg class="timer-ring" viewBox="0 0 200 200">
          <circle class="timer-ring-bg" cx="100" cy="100" r="90"/>
          <circle id="timer-ring-progress" class="timer-ring-progress" cx="100" cy="100" r="90"/>
        </svg>
        <div class="timer-inner">
          <div id="timer-label" class="timer-label">GET READY</div>
          <div id="timer-value" class="timer-value">0:00</div>
          <div id="timer-type-label" class="timer-type-label"></div>
        </div>
      </div>

      <!-- Current exercise name -->
      <h2 id="player-exercise-name" class="player-exercise-name"></h2>

      <!-- Next exercise preview -->
      <p id="player-next" class="player-next"></p>

      <!-- Controls -->
      <div class="player-controls">
        <button id="btn-skip" class="btn btn-icon btn-control" aria-label="Skip to next">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
        </button>
        <button id="btn-play-pause" class="btn btn-play-pause" aria-label="Play or pause">
          <svg id="icon-play" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="btn-done-reps" class="btn btn-done-reps" style="display:none">Done</button>
      </div>
    </div>
  </div>

  <!-- ==================== COMPLETE SCREEN ==================== -->
  <div id="screen-complete" class="screen">
    <div class="complete-body">
      <div class="complete-icon">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 class="complete-title">Done!</h2>
      <p id="complete-summary" class="complete-summary"></p>
      <button id="btn-complete-back" class="btn btn-primary btn-large">Back to Routines</button>
    </div>
  </div>

  <!-- ==================== EXERCISE EDITOR MODAL ==================== -->
  <div id="modal-exercise" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3 class="modal-title" id="modal-exercise-title">Add Exercise</h3>

      <div class="form-group">
        <label for="ex-name">Exercise Name</label>
        <input type="text" id="ex-name" class="input" placeholder="e.g. Hamstring Stretch" maxlength="60">
      </div>

      <div class="form-group">
        <label for="ex-type">Type</label>
        <div class="toggle-group">
          <button id="ex-type-time" class="btn btn-toggle active" data-value="time">Time</button>
          <button id="ex-type-reps" class="btn btn-toggle" data-value="reps">Reps</button>
        </div>
      </div>

      <div class="form-group" id="ex-duration-group">
        <label for="ex-duration">Duration (seconds)</label>
        <input type="number" id="ex-duration" class="input" min="5" max="600" value="30">
      </div>

      <div class="form-group" id="ex-reps-group" style="display:none">
        <label for="ex-reps">Rep Count</label>
        <input type="number" id="ex-reps" class="input" min="1" max="200" value="10">
      </div>

      <div class="form-group">
        <label for="ex-rest">Rest After (seconds)</label>
        <input type="number" id="ex-rest" class="input" min="0" max="120" value="0">
      </div>

      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn btn-outline">Cancel</button>
        <button id="btn-modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ==================== CONFIRM DELETE MODAL ==================== -->
  <div id="modal-confirm" class="modal-overlay" style="display:none">
    <div class="modal modal-small">
      <p id="confirm-message" class="confirm-message"></p>
      <div class="modal-actions">
        <button id="btn-confirm-cancel" class="btn btn-outline">Cancel</button>
        <button id="btn-confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
